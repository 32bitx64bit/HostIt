name: Build Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [agent, server]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build ${{ matrix.component }}
        run: |
          if [ "${{ matrix.component }}" = "agent" ]; then
            cd client && go build ./cmd/agent
          else
            cd server && go build ./...
          fi

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build client on Windows
        run: cd client && go build ./cmd/agent
