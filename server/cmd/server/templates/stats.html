<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{.CSRF}}">
<title>HostIt // Server</title>
<script>(function(){try{var s=localStorage.getItem('hostit-ember-theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="topbar">
  <div class="logo">HostIt <span class="sub">server</span></div>
  <nav class="nav">
    <a class="tab active" href="/">Dashboard</a>
    <a class="tab" href="/config">Config</a>
    <a class="tab" href="/email">Email</a>
    <a class="tab" href="/controls">Controls</a>
    <a class="tab" href="/apps">Apps</a>
    <a class="tab" href="/network-test">Network Test</a>
  </nav>
  <div class="topbar-right">
    <span class="online-dot"></span><span class="online-label" id="onLabel">ONLINE</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">dark</button>
    <span class="ver">{{.Version}}</span>
    <button class="theme-btn" id="logoutBtn">logout</button>
  </div>
</div>
<main id="app"></main>
<div class="statusbar">
  <div class="sb-seg sb-l1">hostit</div>
  <div class="sb-seg sb-l2"><span class="win-act">dashboard</span></div>
  <div class="sb-right">
    <div class="sb-seg sb-r1" id="sbAgent">hostit-server</div>
    <div class="sb-seg sb-r2">routes <span id="sbRoutes">0</span></div>
    <div class="sb-seg sb-r3" id="sbClock">--:--:--</div>
  </div>
</div>
<div class="tip" id="tip"></div>
<div class="update-popup" id="updatePopup" style="display:none;"></div>
<script src="/static/components.js"></script>
<script src="/static/app.js"></script>
<script>
var CSRF = document.querySelector('meta[name="csrf-token"]').content;
var reloadTimer;
function scheduleReload(){if(reloadTimer)return;reloadTimer=setTimeout(function(){location.reload();},1500);}
function fmtNum(n){n=Number(n||0);return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':''+n;}
function fmtBytes(n){n=Number(n||0);if(n>=1073741824)return(n/1073741824).toFixed(2)+' GiB';if(n>=1048576)return(n/1048576).toFixed(2)+' MiB';if(n>=1024)return(n/1024).toFixed(2)+' KiB';return n+' B';}
function fmtMiB(n){return(Number(n||0)/1048576).toFixed(1);}
function fmtInterval(s){s=Number(s||0);if(s>=60)return Math.round(s/60)+'m';return s+'s';}
async function fetchJSON(url){
  var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort();},5000);
  try{
    var res=await fetch(url,{cache:'no-store',headers:{'Accept':'application/json'},signal:ctrl.signal});
    var ct=res.headers.get('content-type')||'';
    if(res.redirected||ct.indexOf('application/json')<0){scheduleReload();throw new Error('dashboard response changed');}
    if(!res.ok)throw new Error('http '+res.status);
    return await res.json();
  }finally{clearTimeout(t);}
}
async function apiPost(url,data){
  var body=new URLSearchParams();body.set('csrf',CSRF);
  if(data)for(var k in data)body.set(k,data[k]);
  var res=await fetch(url,{method:'POST',headers:{'X-CSRF-Token':CSRF,'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  return res;
}

function buildDash(){
  var h=Ember.sectionHead({title:'Server Overview',crumb:'/ dashboard'});
  var grid=Ember.grid({cols:8,cls:'mb0',children:
    Ember.tile({label:'Agent',value:'—',state:'good',id:'sgAgent'})+
    Ember.tile({label:'Public Clients',value:'—',cls:'tnum',state:'acc',id:'sgClients'})+
    Ember.tile({label:'Bandwidth',value:'—',cls:'tnum',id:'sgBand'})+
    Ember.tile({label:'Total Xfer',value:'—',cls:'tnum',id:'sgTotal'})+
    Ember.tile({label:'Routes',value:'—',cls:'tnum',state:'acc',id:'sgRoutes'})+
    Ember.tile({label:'UDP Loss',value:'—',cls:'tnum',style:'color:var(--aqua);',id:'sgLoss'})+
    Ember.tile({label:'UDP Drops',value:'—',cls:'tnum',style:'color:var(--orange);',id:'sgDrops'})+
    Ember.tile({label:'UDP Queues',value:'—',cls:'tnum',style:'color:var(--blue);',id:'sgQueues'})
  });
  var charts='<div class="grid cols-2 mt12">'+
    Ember.panel({emph:true,title:'Bandwidth',head:'<span class="pspacer"></span>'+Ember.badge({text:'live',state:'good'}),body:
      Ember.chart({svgId:'bandChart',bigId:'bandBig',readoutId:'bandReadout',axisId:'bandAxis',unit:'MiB',target:'band',sublabel:'global',bigValue:'0'})
    })+
    Ember.panel({emph:true,title:'Connections',head:'<span class="pspacer"></span>'+Ember.badge({text:'live',state:'good'}),body:
      Ember.chart({svgId:'connChart',bigId:'connBig',readoutId:'connReadout',axisId:'connAxis',unit:'conns',target:'conn',sublabel:'tcp + udp',bigValue:'0'})
    })+'</div>';
  var transport='<div class="grid cols-2 mt12">'+
    Ember.panel({title:'UDP (Global)',body:Ember.console({id:'udpConsole',cls:'sm'})})+
    Ember.panel({title:'TCP (Global)',body:Ember.console({id:'tcpConsole',cls:'sm'})})+
    '</div>';
  var agents=Ember.panel({title:'Agents',cls:'mt12',body:Ember.table({id:'agentsTable',headers:[
    {label:'agent',sortable:true,sort:'id'},{label:'status',sortable:true,sort:'connected'},{label:'registered',sortable:true,sort:'registered'},
    {label:'remote',sortable:true,sort:'remoteAddr'},{label:'routes',sortable:true,sort:'routeCount'},
    {label:'domain',sortable:true,sort:'domainEnabled'},{label:'email',sortable:true,sort:'emailAgent'}
  ]})});
  var routes=Ember.panel({title:'Routes',cls:'mt12',head:'<span class="pspacer"></span>'+Ember.badge({text:'live',state:'good'}),body:'<div id="routesDash"></div>'});
  $('#app').innerHTML=h+grid+charts+transport+agents+routes;
}

var bandRange='6H',connRange='6H';
var RANGE={'1H':12,'6H':24,'12H':36,'24H':48};
var agentsSort={key:'id',dir:1};

function renderBand(series){
  var data=(series||[]).slice(-RANGE[bandRange]).map(function(p){return Number(p.bytes||0)/1048576;});
  if(!data.length)data=[0];
  drawBars({svg:'bandChart',data:data,unit:'MiB',readout:'bandReadout',big:'bandBig',axis:'bandAxis',
    fmt:function(v){return v.toFixed(2);},bigfmt:function(v){return v.toFixed(1);},axisfmt:function(v){return v>=10?v.toFixed(0):(v<0.05?'0':v.toFixed(1));}});
}
function renderConn(series){
  var data=(series||[]).slice(-RANGE[connRange]).map(function(p){return Number(p.conns||0);});
  if(!data.length)data=[0];
  drawBars({svg:'connChart',data:data,unit:'conns',readout:'connReadout',big:'connBig',axis:'connAxis',
    fmt:function(v){return ''+Math.round(v);},bigfmt:function(v){return ''+Math.round(v);},axisfmt:function(v){return ''+Math.round(v);}});
}

function renderAgents(agents){
  var tb=$('#agentsTable tbody');if(!tb)return;
  var rows=(agents||[]).slice().sort(function(a,b){
    var k=agentsSort.key,av=String(a[k]!==undefined?a[k]:''),bv=String(b[k]!==undefined?b[k]:'');
    if(k==='routeCount'){av=''+a.routeCount;bv=''+b.routeCount;}
    return(av<bv?-1:av>bv?1:0)*agentsSort.dir;
  });
  tb.innerHTML=rows.map(function(a){
    return '<tr><td class="acc">'+esc(a.id)+'</td>'+
    '<td><span class="badge '+(a.connected?'good':'bad')+'">'+(a.connected?'Connected':'Disconnected')+'</span></td>'+
    '<td class="muted">'+(a.registered?'registered':'local')+'</td>'+
    '<td class="mono">'+esc(a.remoteAddr||'—')+'</td>'+
    '<td class="mono">'+(a.routeCount||0)+'</td>'+
    '<td>'+(a.domainEnabled?'<span style="color:var(--green)">yes</span>':'<span class="muted">no</span>')+'</td>'+
    '<td>'+(a.emailAgent?'<span style="color:var(--green)">yes</span>':'<span class="muted">no</span>')+'</td></tr>';
  }).join('');
  $$('#agentsTable th.sortable').forEach(function(th){
    var ar=th.querySelector('.arrow');
    if(!ar){ar=document.createElement('span');ar.className='arrow';th.appendChild(document.createTextNode(' '));th.appendChild(ar);}
    ar.textContent=(th.getAttribute('data-sort')===agentsSort.key)?(agentsSort.dir>0?'\u25bc':'\u25b1'):'';
  });
}

function isUDPKind(kind){return kind&&kind.indexOf('udp')>=0;}
function isTCPKind(kind){return kind&&(kind.indexOf('connect')>=0||kind==='paired'||kind.indexOf('tcp')>=0||kind.indexOf('pair')>=0);}

function renderTransport(systemEvents,udp){
  var udpEvs=[],tcpEvs=[];
  (systemEvents||[]).forEach(function(ev){
    if(isUDPKind(ev.kind)){udpEvs.push(ev);}else{tcpEvs.push(ev);}
  });
  if(udp){
    udpEvs.push({kind:'udp_telemetry',detail:'loss='+Number(udp.lossPercent||0).toFixed(2)+'% drops='+fmtNum(udp.totalDrops||0)});
  }
  function renderList(id,evs,empty){
    var el=$('#'+id);if(!el)return;
    if(!evs.length){el.innerHTML='<div class="ln muted">'+empty+'</div>';return;}
    el.innerHTML=evs.slice(-50).map(function(ev){
      var ts=new Date(Number(ev.t||0)*1000);var t=ts.getHours()?pad(ts.getHours())+':'+pad(ts.getMinutes())+':'+pad(ts.getSeconds()):'';
      var cls=ev.kind&&ev.kind.indexOf('connect')>=0?'c-conn':ev.kind&&ev.kind.indexOf('udp')>=0?'c-udp':ev.kind&&ev.kind.indexOf('disc')>=0?'c-disc':ev.kind&&ev.kind.indexOf('err')>=0?'c-err':'c-data';
      return '<div class="ln"><span class="ts">'+t+'</span> <span class="'+cls+'">'+esc(ev.kind||'')+'</span> '+esc(ev.detail||ev.ip||'')+'</div>';
    }).join('');
  }
  renderList('udpConsole',udpEvs,'No UDP events yet.');
  renderList('tcpConsole',tcpEvs,'No TCP events yet.');
}

function renderRoutes(routes){
  var el=$('#routesDash');if(!el)return;
  if(!routes||!routes.length){el.innerHTML='<div class="muted">No routes configured.</div>';return;}
  el.innerHTML=routes.map(function(r,idx){
    return Ember.routeCard({name:r.name,proto:r.proto,pub:r.publicAddr,owner:r.agent,on:r.enabled,active:r.active,idx:idx});
  }).join('');
  routes.forEach(function(r,idx){
    var evs=(r.events||[]).slice(-20);
    var evEl=$('#routeEvt_'+idx);
    if(evEl){
      evEl.innerHTML=evs.map(function(ev){
        var ts=new Date(Number(ev.t||0)*1000);
        var t=pad(ts.getHours())+':'+pad(ts.getMinutes())+':'+pad(ts.getSeconds());
        var cls=ev.kind&&ev.kind.indexOf('connect')>=0?'c-conn':ev.kind&&ev.kind.indexOf('udp')>=0?'c-udp':ev.kind&&ev.kind.indexOf('err')>=0?'c-err':'c-data';
        return '<div class="ln"><span class="ts">'+t+'</span> <span class="'+cls+'">'+esc(ev.kind||'')+'</span> '+esc(ev.detail||ev.ip||'')+'</div>';
      }).join('')||'<div class="ln muted">No events yet.</div>';
    }
    var lossEl=$('#routeLoss_'+idx);
    if(lossEl){
      var lossEvs=evs.filter(function(ev){return ev.kind&&ev.kind.indexOf('loss')>=0;});
      if(lossEvs.length){lossEl.innerHTML=lossEvs.map(function(ev){var ts=new Date(Number(ev.t||0)*1000);var t=pad(ts.getHours())+':'+pad(ts.getMinutes())+':'+pad(ts.getSeconds());return '<div class="ln"><span class="ts">'+t+'</span> <span class="c-udp">'+esc(ev.kind||'')+'</span> '+esc(ev.detail||'')+'</div>';}).join('');}
      else{lossEl.innerHTML='<div class="ln muted">No packet loss events.</div>';}
    }
  });
  $$('.route-head').forEach(function(h){
    h.addEventListener('click',function(e){if(e.target.closest('.rtoggle'))return;$('#route_'+h.getAttribute('data-rt')).classList.toggle('open');});
  });
  $$('.rtoggle').forEach(function(t){
    t.addEventListener('click',function(e){e.stopPropagation();toggleRoute(+t.getAttribute('data-rt'));});
  });
}

async function toggleRoute(idx){
  var r=lastStats.routes[idx];if(!r)return;
  var newVal=r.enabled?'':'1';
  var res=await apiPost('/api/routes/toggle',{route:r.name,enabled:newVal});
  if(res.ok){r.enabled=!r.enabled;var b=$('#routeOn_'+idx);b.className='badge '+(r.enabled?'good':'neutral');b.textContent=r.enabled?'ON':'OFF';var on=lastStats.routes.filter(function(x){return x.enabled;}).length;$('#sgRoutes').textContent=on;$('#sbRoutes').textContent=on;}
}

var lastStats=null;
async function poll(){
  try{
    var j=await fetchJSON('/api/stats');
    $('#onLabel').textContent='ONLINE';lastStats=j;
    $('#sgAgent').textContent=j.agentConnected?'[CONNECTED]':'[DISCONNECTED]';
    $('#sgAgent').className='v '+(j.agentConnected?'good':'bad');
    $('#sgClients').textContent=fmtNum(j.activeClients||0);
    var lastBucket=(j.series||[]).slice(-1)[0]||{};
    $('#sgBand').textContent=fmtMiB(lastBucket.bytes||0)+' MiB';
    $('#sgTotal').textContent=fmtBytes(j.bytesTotal||0);
    var onRoutes=(j.routes||[]).filter(function(r){return r.enabled;}).length;
    $('#sgRoutes').textContent=onRoutes;$('#sbRoutes').textContent=onRoutes;
    var udp=j.udp||null;
    $('#sgLoss').textContent=udp?(Number(udp.lossPercent||0)).toFixed(2)+'%':'—';
    $('#sgDrops').textContent=udp?fmtNum(udp.totalDrops||0):'—';
    $('#sgQueues').textContent=udp?(fmtNum(udp.publicQueueDepth||0)+'/'+fmtNum(udp.agentQueueDepth||0)):'—';
    renderBand(j.series);renderConn(j.series);
    renderAgents(j.agents);renderTransport(j.systemEvents,udp);renderRoutes(j.routes);
    if(j.err){$('#onLabel').textContent='error';}
  }catch(e){
    $('#onLabel').textContent='Syncing';
    var sg=$('#sgAgent');if(sg){sg.textContent='[SYNCING]';sg.className='v warn';}
  }
}

var updateTimer;
async function pollUpdate(){
  var s=await fetchJSON('/api/update/status');if(!s)return;
  var canUpdate = !!s.showPopup && isNewerVersion(s.availableVersion, s.currentVersion);
  if(canUpdate){
    var p=$('#updatePopup');
    p.innerHTML=Ember.updatePopup({current:s.currentVersion,available:s.availableVersion});
    p.style.display='';p.classList.add('show');
    $('#updateClose').addEventListener('click',function(){p.classList.remove('show');p.style.display='none';});
    $('#updateSkip').addEventListener('click',function(){apiPost('/api/update/skip');p.classList.remove('show');p.style.display='none';});
    $('#updateLater').addEventListener('click',function(){apiPost('/api/update/remind');p.classList.remove('show');p.style.display='none';});
    $('#updateDo').addEventListener('click',function(){apiPost('/api/update/apply');$('#updateProgress').textContent='> starting update...\n';});
  }
}

function pad(n){return n<10?'0'+n:''+n;}

buildDash();
initTheme('themeBtn','hostit-ember-theme');
initClock('sbClock');
initChartTooltip();
$$('.chip[data-target="band"]').forEach(function(c){c.addEventListener('click',function(){bandRange=c.getAttribute('data-range');$$('.chip[data-target="band"]').forEach(function(x){x.classList.toggle('active',x===c);});if(lastStats)renderBand(lastStats.series);});});
$$('.chip[data-target="conn"]').forEach(function(c){c.addEventListener('click',function(){connRange=c.getAttribute('data-range');$$('.chip[data-target="conn"]').forEach(function(x){x.classList.toggle('active',x===c);});if(lastStats)renderConn(lastStats.series);});});
$$('#agentsTable th.sortable').forEach(function(th){th.addEventListener('click',function(){var k=th.getAttribute('data-sort');if(agentsSort.key===k)agentsSort.dir*=-1;else{agentsSort.key=k;agentsSort.dir=1;}if(lastStats)renderAgents(lastStats.agents);});});
$('#logoutBtn').addEventListener('click',function(){var f=document.createElement('form');f.method='POST';f.action='/logout';var i=document.createElement('input');i.type='hidden';i.name='csrf';i.value=CSRF;f.appendChild(i);document.body.appendChild(f);f.submit();});
poll();setInterval(poll,3000);
pollUpdate();updateTimer=setInterval(pollUpdate,30000);
</script>
</body>
</html>
