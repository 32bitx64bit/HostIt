<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{.CSRF}}">
<title>HostIt // Server — Email</title>
<script>(function(){try{var s=localStorage.getItem('hostit-ember-theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
<style>
.acct-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;}
.acct-card+.acct-card{margin-top:12px;}
.acct-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.acct-head b{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg4);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:6px;}
.note-box{font-size:12px;color:var(--fg4);padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg1);margin-bottom:14px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">HostIt <span class="sub">server</span></div>
  <nav class="nav">
    <a class="tab" href="/">Dashboard</a>
    <a class="tab" href="/config">Config</a>
    <a class="tab active" href="/email">Email</a>
    <a class="tab" href="/controls">Controls</a>
    <a class="tab" href="/apps">Apps</a>
    <a class="tab" href="/network-test">Network Test</a>
  </nav>
  <div class="topbar-right">
    <span class="online-dot"></span><span class="online-label">ONLINE</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">dark</button>
    <span class="ver">{{.Version}}</span>
    <button class="theme-btn" id="logoutBtn">logout</button>
  </div>
</div>
<main id="app"></main>
<div class="statusbar">
  <div class="sb-seg sb-l1">hostit</div>
  <div class="sb-seg sb-l2"><span class="win-act">email</span></div>
  <div class="sb-right">
    <div class="sb-seg sb-r1" id="sbAgent">hostit-server</div>
    <div class="sb-seg sb-r2">accounts <span id="sbRoutes">0</span></div>
    <div class="sb-seg sb-r3" id="sbClock">--:--:--</div>
  </div>
</div>
<script src="/static/components.js"></script>
<script src="/static/app.js"></script>
<script>
var CSRF = document.querySelector('meta[name="csrf-token"]').content;
var reloadTimer;
function scheduleReload(){if(reloadTimer)return;reloadTimer=setTimeout(function(){location.reload();},1500);}
async function fetchJSON(url){
  var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort();},5000);
  try{
    var res=await fetch(url,{headers:{'Accept':'application/json'},signal:ctrl.signal});
    clearTimeout(t);
    if(res.redirected||!res.headers.get('content-type')||res.headers.get('content-type').indexOf('application/json')===-1){scheduleReload();return null;}
    return await res.json();
  }catch(e){clearTimeout(t);scheduleReload();return null;}
}
async function apiPost(url,data){
  var body=new URLSearchParams();body.set('csrf',CSRF);
  if(data)for(var k in data)body.set(k,data[k]);
  var res=await fetch(url,{method:'POST',headers:{'X-CSRF-Token':CSRF,'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  return res;
}
function val(id){var el=$('#'+id);return el?el.value:'';}
function chk(id){var el=$('#'+id);return el?el.checked:false;}

var CFG = {
  enabled: {{if .Cfg.Email.Enabled}}true{{else}}false{{end}},
  domain: "{{.Cfg.Email.Domain}}",
  mailHost: "{{.Cfg.Email.MailHost}}",
  autoTLS: {{if .Cfg.Email.AutoTLS}}true{{else}}false{{end}},
  acmeEmail: "{{.Cfg.Email.ACMEEmail}}",
  acmeHTTPAddr: "{{.Cfg.Email.ACMEHTTPAddr}}",
  tlsCertPath: "{{.Cfg.Email.TLSCertPath}}",
  tlsKeyPath: "{{.Cfg.Email.TLSKeyPath}}",
  dkimSelector: "{{.Cfg.Email.DKIMSelector}}",
  dkimKeyPath: "{{.Cfg.Email.DKIMKeyPath}}",
  submissionAddr: "{{.Cfg.Email.SubmissionAddr}}",
  submissionTLSAddr: "{{.Cfg.Email.SubmissionTLSAddr}}",
  imapAddr: "{{.Cfg.Email.IMAPAddr}}",
  imapTLSAddr: "{{.Cfg.Email.IMAPTLSAddr}}",
  inboundSMTP: {{if .Cfg.Email.InboundSMTP}}true{{else}}false{{end}},
  inboundSMTPAddr: "{{.Cfg.Email.InboundSMTPAddr}}",
  maxMessageMB: "{{if .EmailMaxMessageMB}}{{.EmailMaxMessageMB}}{{else}}25{{end}}",
  maxRecipients: "{{if .Cfg.Email.MaxRecipients}}{{.Cfg.Email.MaxRecipients}}{{else}}100{{end}}",
  storageLimit: "{{.EmailStorageLimit}}",
  storageUnlimited: {{if not .Cfg.Email.StorageLimitBytes}}true{{else}}false{{end}}
};
var ACCOUNTS = [
{{range .EmailAccounts}}{username:"{{.Username}}",address:"{{.Address}}",passwordSet:{{if .PasswordSet}}true{{else}}false{{end}},enabled:{{if .Enabled}}true{{else}}false{{end}}},{{end}}
];

function renderAccountCard(i,a){
  a=a||{};
  var ph=a.passwordSet?'Leave blank to keep existing':'Set password';
  var hint=a.passwordSet?'Password already set. Leave blank to keep.':'No password set yet. Required for new accounts.';
  return '<div class="acct-card" data-idx="'+i+'">'+
    '<div class="acct-head"><b>'+(a.address||('account #'+i))+'</b>'+Ember.button({id:'rmAcct_'+i,text:'Remove',variant:'danger',cls:'sm'})+'</div>'+
    '<div class="grid cols-2">'+
    Ember.field({label:'Username',hint:'Enter only the username part (before the @).',content:Ember.input({id:'au_'+i,value:a.username,placeholder:'alice'})})+
    Ember.field({label:'Password',hint:hint,content:Ember.input({id:'ap_'+i,type:'password',value:'',placeholder:ph})})+
    Ember.field({label:'Enabled',content:Ember.toggle({id:'ae_'+i,labelId:'ael_'+i,label:a.enabled?'on':'off',checked:!!a.enabled})})+
    '</div></div>';
}

function renderAccounts(){
  var el=$('#acctList');if(!el)return;
  if(!ACCOUNTS.length){el.innerHTML='<div class="muted">No accounts configured. Add one below.</div>';}
  else{el.innerHTML=ACCOUNTS.map(function(a,i){return renderAccountCard(i,a);}).join('');}
  ACCOUNTS.forEach(function(a,i){
    if($('#ae_'+i))bindToggleLabel('ae_'+i,'ael_'+i,'on','off');
    var rm=$('#rmAcct_'+i);if(rm)rm.addEventListener('click',function(){ACCOUNTS.splice(i,1);renderAccounts();updateAcctCount();});
  });
  updateAcctCount();
}

function updateAcctCount(){
  var n=ACCOUNTS.length;
  var sb=$('#sbRoutes');if(sb)sb.textContent=String(n);
  var c=$('#cfgAcctCount');if(c)c.textContent=String(n);
}

function collectAccounts(){
  var out=[];
  ACCOUNTS.forEach(function(a,i){
    out.push({username:val('au_'+i),password:val('ap_'+i),enabled:chk('ae_'+i)});
  });
  return out;
}

function collectEmail(){
  var d={};
  d.email_enabled=chk('emailEnabled')?'1':'';
  d.email_domain=val('emailDomain');
  d.email_mail_host=val('emailMailHost');
  d.email_auto_tls=chk('emailAutoTLS')?'1':'';
  d.email_acme_email=val('emailACMEEmail');
  d.email_acme_http_addr=val('emailACMEHTTPAddr');
  d.email_tls_cert_path=val('emailTLSCertPath');
  d.email_tls_key_path=val('emailTLSKeyPath');
  d.email_dkim_selector=val('emailDKIMSelector');
  d.email_dkim_key_path=val('emailDKIMKeyPath');
  d.email_submission_addr=val('emailSubmissionAddr');
  d.email_submission_tls_addr=val('emailSubmissionTLSAddr');
  d.email_imap_addr=val('emailIMAPAddr');
  d.email_imap_tls_addr=val('emailIMAPTLSAddr');
  d.email_inbound_smtp=chk('emailInboundSMTP')?'1':'';
  d.email_inbound_smtp_addr=val('emailInboundSMTPAddr');
  d.email_max_message_mb=val('emailMaxMessageMB');
  d.email_max_recipients=val('emailMaxRecipients');
  if(chk('emailStorageUnlimited')){d.email_storage_unlimited='1';d.email_storage_limit='';}
  else{d.email_storage_unlimited='';d.email_storage_limit=val('emailStorageLimit');}
  var accts=collectAccounts();
  d.email_account_count=String(accts.length);
  accts.forEach(function(a,i){
    d['email_account_'+i+'_username']=a.username;
    d['email_account_'+i+'_password']=a.password;
    d['email_account_'+i+'_enabled']=a.enabled?'1':'';
  });
  return d;
}

async function saveEmail(){
  var d=collectEmail();
  setStatus('emailStatus','saving + restarting...','ok');
  try{
    var res=await apiPost('/email/save',d);
    if(res.ok){setStatus('emailStatus','saved + restarted','ok');scheduleReload();}
    else{var t=await res.text();setStatus('emailStatus','error: '+t.slice(0,160),'err');}
  }catch(e){setStatus('emailStatus','error: '+e.message,'err');}
}

function renderChecks(report){
  var el=$('#checkResults');if(!el)return;
  if(!report){el.innerHTML='<div class="muted">No report.</div>';return;}
  var html='';
  if(report.summary){html+='<div class="statusline"><span class="gt">&gt;</span> <span>'+esc(report.summary)+'</span></div>';}
  if(report.counts){
    html+='<div class="btn-row" style="margin:8px 0;">'+
      Ember.badge({text:'ok '+report.counts.ok,state:'good'})+
      Ember.badge({text:'warn '+report.counts.warn,state:'warn'})+
      Ember.badge({text:'fail '+report.counts.fail,state:'bad'})+
      '</div>';
  }
  var checks=report.checks||[];
  if(!checks.length){html+='<div class="muted">No checks ran.</div>';}
  else{html+=checks.map(function(c){
    return Ember.checkItem({name:c.name,status:c.status,summary:c.summary,fix:c.fix,details:c.details});
  }).join('');}
  el.innerHTML=html;
}

async function runChecks(){
  var btn=$('#runChecksBtn');if(btn)btn.disabled=true;
  setStatus('emailStatus','running mail checks...','ok');
  var el=$('#checkResults');if(el)el.innerHTML='<div class="muted">checking...</div>';
  try{
    var res=await apiPost('/api/email/check',{});
    if(res.ok){var j=await res.json();renderChecks(j);setStatus('emailStatus','checks complete','ok');}
    else{var t=await res.text();if(el)el.innerHTML='<div class="statusline err"><span class="gt">&gt;</span> <span>'+esc(t.slice(0,200))+'</span></div>';setStatus('emailStatus','check error','err');}
  }catch(e){if(el)el.innerHTML='<div class="muted">error: '+esc(e.message)+'</div>';setStatus('emailStatus','error: '+e.message,'err');}
  finally{if(btn)btn.disabled=false;}
}

function buildEmail(){
  var h=Ember.sectionHead({title:'Email',crumb:'/ email'});
  var status=Ember.statusline({id:'emailStatus',text:'ready'});
  var topRow='<div class="btn-row" style="margin-bottom:10px;">'+Ember.button({id:'setupGuideBtn',text:'DNS setup guide'})+'</div>';
  var note='<div class="note-box"><b>Important:</b> Domain is the part after the @ in your email address. If your mailbox is alice@example.com, use example.com. Mail Host is the server hostname other mail servers connect to, usually mail.&lt;your-domain&gt;.</div>';

  var mailBody='<div class="grid cols-2">'+
    Ember.field({label:'Enable Email',hint:'Turns on the built-in local mail stack on the agent.',content:Ember.toggle({id:'emailEnabled',labelId:'emailEnabledLbl',label:CFG.enabled?'on':'off',checked:CFG.enabled})})+
    Ember.field({label:'Domain',hint:'Mailbox domain. The exact part after @ in your addresses.',content:Ember.input({id:'emailDomain',value:CFG.domain,placeholder:'example.com'})})+
    Ember.field({label:'Mail Host',hint:'Public server hostname for SMTP/TLS. Usually mail.&lt;domain&gt;.',content:Ember.input({id:'emailMailHost',value:CFG.mailHost,placeholder:'mail.example.com'})})+
    Ember.field({label:'Automatic Public TLS',hint:'Use Let\'s Encrypt for the mail host so clients get a trusted cert.',content:Ember.toggle({id:'emailAutoTLS',labelId:'emailAutoTLSLbl',label:CFG.autoTLS?'on':'off',checked:CFG.autoTLS})})+
    Ember.field({label:'ACME Email',hint:'Let\'s Encrypt registration email. Required when Auto TLS is on.',content:Ember.input({id:'emailACMEEmail',value:CFG.acmeEmail,placeholder:'admin@example.com'})})+
    Ember.field({label:'ACME HTTP Bind',hint:'Public HTTP listener for Let\'s Encrypt HTTP-01 validation, usually :80.',content:Ember.input({id:'emailACMEHTTPAddr',value:CFG.acmeHTTPAddr,placeholder:':80'})})+
    Ember.field({label:'TLS Cert Path',hint:'Optional PEM cert path on the agent. Leave blank for self-signed or Auto TLS.',content:Ember.input({id:'emailTLSCertPath',value:CFG.tlsCertPath,placeholder:'/etc/ssl/mail/fullchain.pem'})})+
    Ember.field({label:'TLS Key Path',hint:'Optional PEM key path on the agent. Must be set together with the cert path.',content:Ember.input({id:'emailTLSKeyPath',value:CFG.tlsKeyPath,placeholder:'/etc/ssl/mail/privkey.pem'})})+
    Ember.field({label:'DKIM Selector',hint:'DNS label used for the DKIM TXT record. Leave blank for hostit.',content:Ember.input({id:'emailDKIMSelector',value:CFG.dkimSelector,placeholder:'hostit'})})+
    Ember.field({label:'DKIM Key Path',hint:'Optional PEM key path on the agent. Leave blank to auto-generate.',content:Ember.input({id:'emailDKIMKeyPath',value:CFG.dkimKeyPath,placeholder:'/var/lib/hostit/mail/dkim.pem'})})+
    Ember.field({label:'Submission Bind',hint:'Local authenticated SMTP submission. Default 127.0.0.1:1587.',content:Ember.input({id:'emailSubmissionAddr',value:CFG.submissionAddr,placeholder:'127.0.0.1:1587'})})+
    Ember.field({label:'Submission TLS Bind',hint:'Implicit TLS SMTP submission. Default 127.0.0.1:1465.',content:Ember.input({id:'emailSubmissionTLSAddr',value:CFG.submissionTLSAddr,placeholder:'127.0.0.1:1465'})})+
    Ember.field({label:'IMAP Bind',hint:'Local IMAP listener. Default 127.0.0.1:1143.',content:Ember.input({id:'emailIMAPAddr',value:CFG.imapAddr,placeholder:'127.0.0.1:1143'})})+
    Ember.field({label:'IMAPS Bind',hint:'Implicit TLS IMAP listener. Default 127.0.0.1:1993.',content:Ember.input({id:'emailIMAPTLSAddr',value:CFG.imapTLSAddr,placeholder:'127.0.0.1:1993'})})+
    Ember.field({label:'Inbound SMTP',hint:'Accept direct inbound SMTP delivery from the internet for your domain.',content:Ember.toggle({id:'emailInboundSMTP',labelId:'emailInboundSMTPLbl',label:CFG.inboundSMTP?'on':'off',checked:CFG.inboundSMTP})+'<div style="margin-top:8px">'+Ember.input({id:'emailInboundSMTPAddr',value:CFG.inboundSMTPAddr,placeholder:'127.0.0.1:1025'})+'</div>'})+
    Ember.field({label:'Max Message Size (MB)',hint:'Reject oversized messages early. Whole number of megabytes, e.g. 25.',content:Ember.input({id:'emailMaxMessageMB',value:CFG.maxMessageMB,placeholder:'25'})})+
    Ember.field({label:'Max Recipients',hint:'Per-email recipient cap for submission and inbound SMTP.',content:Ember.input({id:'emailMaxRecipients',value:CFG.maxRecipients,placeholder:'100'})})+
    Ember.field({label:'Storage',hint:'When unlimited is off, enter a size like 500MB, 1GB or 5TB.',content:Ember.toggle({id:'emailStorageUnlimited',labelId:'emailStorageUnlimitedLbl',label:CFG.storageUnlimited?'on':'off',checked:CFG.storageUnlimited})+'<div style="margin-top:8px">'+Ember.input({id:'emailStorageLimit',value:CFG.storageLimit,placeholder:'1GB',readonly:false})+'</div>'})+
    '</div>'+
    '<div class="btn-row">'+Ember.button({id:'saveMail',text:'Save + restart',variant:'primary'})+'</div>';

  var mail=Ember.panel({emph:true,title:'Mail Service',body:mailBody});

  var accounts=Ember.panel({title:'Accounts',cls:'mt12',head:'<span class="pspacer"></span><span class="muted">count <span id="cfgAcctCount">'+ACCOUNTS.length+'</span></span>',body:
    '<div id="acctList"></div>'+
    '<div class="btn-row">'+Ember.button({id:'addAcctBtn',text:'+ Add account'})+Ember.button({id:'saveAccts',text:'Save + restart',variant:'primary'})+'</div>'
  });

  var checks=Ember.panel({title:'DNS + Mail Checks',cls:'mt12',head:'<span class="pspacer"></span>'+Ember.button({id:'runChecksBtn',text:'Run checks now',variant:'primary'}),body:'<div id="checkResults"><div class="muted">Run checks to verify DNS records, TLS and mail delivery.</div></div>'});

  $('#app').innerHTML=h+status+topRow+note+mail+accounts+checks;

  styleSelects($('#app'));
  bindToggleLabel('emailEnabled','emailEnabledLbl','on','off');
  bindToggleLabel('emailAutoTLS','emailAutoTLSLbl','on','off');
  bindToggleLabel('emailInboundSMTP','emailInboundSMTPLbl','on','off');
  bindToggleLabel('emailStorageUnlimited','emailStorageUnlimitedLbl','on','off');
  renderAccounts();
  syncStorageLimit();

  $('#saveMail').addEventListener('click',saveEmail);
  $('#saveAccts').addEventListener('click',saveEmail);
  $('#runChecksBtn').addEventListener('click',runChecks);
  $('#setupGuideBtn').addEventListener('click',function(){location.href='/email/setup';});
  $('#addAcctBtn').addEventListener('click',function(){ACCOUNTS.push({username:'',address:'',passwordSet:false,enabled:true});renderAccounts();});
  $('#emailStorageUnlimited').addEventListener('change',syncStorageLimit);
}

function syncStorageLimit(){
  var un=chk('emailStorageUnlimited');
  var lim=$('#emailStorageLimit');if(lim)lim.disabled=!!un;
}

buildEmail();
initTheme('themeBtn','hostit-ember-theme');
initClock('sbClock');
$('#logoutBtn').addEventListener('click',function(){var f=document.createElement('form');f.method='POST';f.action='/logout';var i=document.createElement('input');i.type='hidden';i.name='csrf';i.value=CSRF;f.appendChild(i);document.body.appendChild(f);f.submit();});
</script>
</body>
</html>
