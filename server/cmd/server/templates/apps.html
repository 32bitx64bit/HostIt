<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{.CSRF}}">
<title>HostIt // Server — Apps</title>
<script>(function(){try{var s=localStorage.getItem('hostit-ember-theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="topbar">
  <div class="logo">HostIt <span class="sub">server</span></div>
  <nav class="nav">
    <a class="tab" href="/">Dashboard</a>
    <a class="tab" href="/config">Config</a>
    <a class="tab" href="/email">Email</a>
    <a class="tab" href="/controls">Controls</a>
    <a class="tab active" href="/apps">Apps</a>
    <a class="tab" href="/network-test">Network Test</a>
  </nav>
  <div class="topbar-right">
    <span class="online-dot"></span><span class="online-label" id="onLabel">ONLINE</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">dark</button>
    <span class="ver">{{.Version}}</span>
    <button class="theme-btn" id="logoutBtn">logout</button>
  </div>
</div>
<main id="app" style="padding:16px 14px 26px;max-width:1320px;margin:0 auto;"></main>
<div class="statusbar">
  <div class="sb-seg sb-l1">hostit</div>
  <div class="sb-seg sb-l2"><span class="win-act">apps</span></div>
  <div class="sb-right">
    <div class="sb-seg sb-r1" id="sbAgent">hostit-server</div>
    <div class="sb-seg sb-r2">routes <span id="sbRoutes">0</span></div>
    <div class="sb-seg sb-r3" id="sbClock">--:--:--</div>
  </div>
</div>
<div class="tip" id="tip"></div>
<script src="/static/components.js"></script>
<script src="/static/app.js"></script>
<script>
var CSRF=document.querySelector('meta[name="csrf-token"]').content;
var reloadTimer;
function scheduleReload(){if(reloadTimer)return;reloadTimer=setTimeout(function(){location.reload();},1500);}
async function fetchJSON(url){
  var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort();},8000);
  try{
    var res=await fetch(url,{headers:{'Accept':'application/json'},signal:ctrl.signal});
    clearTimeout(t);
    if(res.redirected||!res.headers.get('content-type')||res.headers.get('content-type').indexOf('application/json')===-1){scheduleReload();return null;}
    return await res.json();
  }catch(e){clearTimeout(t);scheduleReload();return null;}
}
async function apiPost(url,data){
  var body=new URLSearchParams();body.set('csrf',CSRF);
  if(data)for(var k in data)body.set(k,data[k]);
  return await fetch(url,{method:'POST',headers:{'X-CSRF-Token':CSRF,'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
}
function pad(n){return n<10?'0'+n:''+n;}
function fmtDate(s){var d=new Date(s);if(isNaN(d.getTime()))return s||'—';return d.toLocaleDateString()+' '+pad(d.getHours())+':'+pad(d.getMinutes());}

var APPS=[],openApps={};

function buildApps(){
  var h=Ember.sectionHead({title:'Apps',crumb:'/apps'});
  var body=Ember.statusline({id:'appsStatus',text:'idle'})+'<div id="appsList"><div class="muted">loading...</div></div>';
  $('#app').innerHTML=h+Ember.panel({title:'Registered Applications',cls:'mt12',body:body});
  $('#logoutBtn').addEventListener('click',function(){var f=document.createElement('form');f.method='POST';f.action='/logout';var i=document.createElement('input');i.type='hidden';i.name='csrf';i.value=CSRF;f.appendChild(i);document.body.appendChild(f);f.submit();});
  loadApps();
}

async function loadApps(){
  var apps=await fetchJSON('/api/apps/list');
  if(!apps){$('#onLabel').textContent='error';$('#appsList').innerHTML='<div class="muted">Failed to load apps.</div>';return;}
  $('#onLabel').textContent='ONLINE';
  renderApps(apps);
}

function renderApps(apps){
  APPS=apps||[];
  var el=$('#appsList');if(!el)return;
  if(!APPS.length){el.innerHTML='<div class="muted">No registered applications.</div>';$('#sbRoutes').textContent='0';return;}
  var totalRoutes=0;
  el.innerHTML=APPS.map(function(a,i){
    var routes=a.Routes||[];totalRoutes+=routes.length;
    return '<div class="appcard'+(openApps[a.Label]?' open':'')+'" id="app_'+i+'">'+
      '<div class="app-head" data-app="'+i+'"><span class="caret">&#9654;</span>'+
      '<span class="rname">'+esc(a.Label||'')+'</span>'+
      '<span class="rmeta"><span>routes <span class="mono">'+routes.length+'</span></span>'+
      '<span>created <span class="mono muted">'+esc(fmtDate(a.CreatedAt))+'</span></span>'+
      '<span class="badge '+(a.Enabled?'good':'neutral')+'" id="appPill_'+i+'">'+(a.Enabled?'ENABLED':'DISABLED')+'</span></span></div>'+
      '<div class="app-body">'+
      '<div class="table-wrap"><table class="data"><thead><tr><th>name</th><th>proto</th><th>public</th><th>local</th><th>domain</th><th>state</th></tr></thead><tbody>'+
      routes.map(function(r){return '<tr><td class="acc">'+esc(r.RouteName||'')+'</td><td>'+Ember.tag({proto:r.Proto||'tcp'})+'</td><td class="mono">'+esc(r.PublicAddr||'—')+'</td><td class="mono muted">'+esc(r.LocalAddr||'—')+'</td><td class="mono muted">'+esc(r.Domain||'—')+'</td><td>'+(r.Enabled?'<span class="badge good">ON</span>':'<span class="badge neutral">OFF</span>')+'</td></tr>';}).join('')+
      '</tbody></table></div>'+
      '<div class="row-gap" style="padding:10px 12px;">'+Ember.button({text:a.Enabled?'Disable':'Enable',variant:a.Enabled?'':'primary',cls:'sm',id:'appToggle_'+i})+Ember.button({text:'Delete',variant:'danger',cls:'sm',id:'appDel_'+i})+'</div>'+
      '</div></div>';
  }).join('');
  $('#sbRoutes').textContent=totalRoutes;
  $$('.app-head').forEach(function(h){
    h.addEventListener('click',function(){var lab=APPS[+h.getAttribute('data-app')].Label;if(openApps[lab])delete openApps[lab];else openApps[lab]=true;renderApps(APPS);});
  });
  $$('[id^="appToggle_"]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();toggleApp(+b.id.replace('appToggle_',''));});});
  $$('[id^="appDel_"]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();deleteApp(+b.id.replace('appDel_',''));});});
}

async function toggleApp(i){
  var a=APPS[i];if(!a)return;
  var enable=!a.Enabled;
  setStatus('appsStatus',(enable?'enabling':'disabling')+' '+a.Label+'...','ok');
  var res=await apiPost('/api/apps/toggle',{app:a.Label,enabled:enable?'1':''});
  if(res.ok)setStatus('appsStatus','ok: '+(enable?'enabled':'disabled')+': '+a.Label,'ok');
  else setStatus('appsStatus','err: toggle failed ('+res.status+')','err');
  loadApps();
}

async function deleteApp(i){
  var a=APPS[i];if(!a)return;
  if(!confirm('Delete application "'+a.Label+'"? This cannot be undone.'))return;
  setStatus('appsStatus','deleting '+a.Label+'...','ok');
  var res=await apiPost('/api/apps/delete',{app:a.Label});
  if(res.ok)setStatus('appsStatus','ok: deleted '+a.Label,'ok');
  else setStatus('appsStatus','err: delete failed ('+res.status+')','err');
  loadApps();
}

buildApps();
initTheme('themeBtn','hostit-ember-theme');
initClock('sbClock');
</script>
</body>
</html>
