<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{.CSRFToken}}">
<title>HostIt // Agent — Apps</title>
<script>(function(){try{var s=localStorage.getItem('hostit-ember-theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="topbar">
  <div class="logo">HostIt <span class="sub">agent</span></div>
  <nav class="nav">
    <a class="tab" href="/">Home</a>
    <a class="tab" href="/controls">Controls</a>
    <a class="tab active" href="/apps">Apps</a>
    <a class="tab" href="/mail">Mail</a>
  </nav>
  <div class="topbar-right">
    <span class="online-dot"></span><span class="online-label" id="onLabel">ONLINE</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">dark</button>
    <span class="ver">{{.Version}}</span>
  </div>
</div>
<main id="app"><div class="panel"><div class="panel-body"><div class="statusline"><span class="gt">&gt;</span> <span>loading...</span></div></div></div></main>
<div class="statusbar">
  <div class="sb-seg sb-l1">hostit</div>
  <div class="sb-seg sb-l2"><span class="win-act">apps</span></div>
  <div class="sb-right">
    <div class="sb-seg sb-r1" id="sbAgent">agent</div>
    <div class="sb-seg sb-r2">routes <span id="sbRoutes">0</span></div>
    <div class="sb-seg sb-r3" id="sbClock">--:--:--</div>
  </div>
</div>
<script src="/static/components.js"></script>
<script src="/static/app.js"></script>
<script>
var CSRF = document.querySelector('meta[name="csrf-token"]').content;
function apiData(payload) {
  if (payload && payload.status === 'ok' && payload.data !== undefined) return payload.data;
  if (payload && payload.status === 'error') throw new Error(payload.message || 'API error');
  return payload;
}
async function readAPI(res) { return apiData(await res.json()); }
var reloadScheduled = false;
function scheduleReload() { if (reloadScheduled) return; reloadScheduled = true; setTimeout(function () { location.reload(); }, 1500); }
async function fetchJSON(url) {
  var ctl = new AbortController(); var timer = setTimeout(function () { ctl.abort(); }, 5000);
  try {
    var res = await fetch(url, { cache: 'no-store', headers: {'Accept':'application/json'}, signal: ctl.signal });
    var ct = res.headers.get('content-type') || '';
    if (res.redirected || ct.indexOf('application/json') < 0) { scheduleReload(); throw new Error('dashboard response changed'); }
    if (!res.ok) throw new Error('http ' + res.status);
    return await readAPI(res);
  } finally { clearTimeout(timer); }
}
function apiPost(url, data) {
  var body = new URLSearchParams();
  if (data) for (var k in data) body.set(k, data[k]);
  return fetch(url, { method: 'POST', headers: { 'X-CSRF-Token': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
}

function build() {
  var h = Ember.sectionHead({ title: 'Apps', crumb: '/ tunnels' });

  var statusPanel = Ember.panel({ body:
    '<div class="row-gap">'
    + '<span class="muted upper" style="font-size:11px">Connection</span> '
    + Ember.badge({ text: '\u2014', state: 'neutral', id: 'connPill' })
    + '<span class="muted upper" style="font-size:11px;margin-left:10px">Routes</span> '
    + Ember.badge({ text: '0', state: 'neutral', id: 'routeBadge' })
    + '</div>'
  });

  var actionsPanel = Ember.panel({ body:
    '<div class="row-gap">'
    + Ember.button({ id: 'btnRegisterAll', text: 'Register all apps', variant: 'primary', cls: 'sm' })
    + Ember.button({ id: 'btnRefresh', text: 'Refresh', cls: 'sm' })
    + '</div>'
    + Ember.statusline({ id: 'regStatus', text: '' })
  });

  var routesPanel = Ember.panel({ title: 'Active Routes', head: '<span class="pspacer"></span>' + Ember.badge({ text: 'live', state: 'good' }), body:
    Ember.table({ id: 'routesTable', headers: [
      { label: 'name' },
      { label: 'proto' },
      { label: 'public \u2192 local' },
      { label: 'source' }
    ] })
  });

  var eventsPanel = Ember.panel({ title: 'Events', head: '<span class="pspacer"></span>' + Ember.badge({ text: 'SSE', state: 'good' }), body:
    Ember.console({ id: 'eventLog' })
  });

  var topGrid = Ember.grid({ cols: 2, children: statusPanel + actionsPanel });

  $('#app').innerHTML = h + topGrid + '<div class="mt12">' + routesPanel + '</div>' + '<div class="mt12">' + eventsPanel + '</div>';

  var ev = $('#eventLog');
  if (ev) ev.innerHTML = '<div class="ln muted" id="eventsEmpty">listening for events\u2026</div>';

  wire();
}

function wire() {
  $('#btnRefresh').addEventListener('click', pollOnce);
  $('#btnRegisterAll').addEventListener('click', registerAll);
}

function setConn(state, text) {
  var el = $('#connPill'); if (!el) return;
  el.className = 'badge ' + state; el.textContent = text;
  var ol = $('#onLabel');
  if (ol) ol.textContent = (state === 'good') ? 'ONLINE' : (state === 'warn' ? 'Syncing' : 'OFFLINE');
}

function renderRoutes(routes) {
  var tb = $('#routesTable tbody'); if (!tb) return;
  if (!routes || !routes.length) { tb.innerHTML = '<tr><td colspan="4" class="muted">No active routes.</td></tr>'; return; }
  tb.innerHTML = routes.map(function (r) {
    return '<tr>'
      + '<td class="acc">' + esc(r.name || '') + '</td>'
      + '<td>' + Ember.protoTag(r.proto || 'tcp') + '</td>'
      + '<td class="mono">' + esc(r.publicAddr || '') + ' &rarr; ' + esc(r.localTarget || r.localAddr || '') + '</td>'
      + '<td>' + Ember.badge({ text: 'dynamic', state: 'neutral' }) + '</td>'
      + '</tr>';
  }).join('');
}

async function pollOnce() {
  try {
    var j = await fetchJSON('/api/status');
    if (!j) { setConn('warn', 'Syncing'); return; }
    setConn(j.connected ? 'good' : 'bad', j.connected ? 'Connected' : 'Disconnected');
    var rc = j.routeCount != null ? j.routeCount : (j.routes ? j.routes.length : 0);
    var rb = $('#routeBadge'); if (rb) rb.textContent = String(rc);
    var sr = $('#sbRoutes'); if (sr) sr.textContent = String(rc);
    renderRoutes(j.routes);
  } catch (e) { setConn('warn', 'Syncing'); }
}

async function registerAll() {
  var btn = $('#btnRegisterAll'); if (btn) btn.disabled = true;
  setStatus('regStatus', 'registering apps\u2026', '');
  try {
    var res = await apiPost('/api/v1/apps/register-all');
    if (res.status === 204 || res.ok) { setStatus('regStatus', 'registered', 'ok'); }
    else { setStatus('regStatus', 'register failed (http ' + res.status + ')', 'err'); }
  } catch (e) { setStatus('regStatus', 'register failed', 'err'); }
  if (btn) btn.disabled = false;
  setTimeout(pollOnce, 500);
}

function evtClass(type) {
  switch (type) {
    case 'connected': return 'c-conn';
    case 'disconnected': return 'c-disc';
    case 'route_updated':
    case 'routes_updated': return 'c-data';
    default: return 'lv-info';
  }
}
function addEvent(ev) {
  var log = $('#eventLog'); if (!log) return;
  var empty = $('#eventsEmpty'); if (empty) empty.style.display = 'none';
  var ts = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : nowClock();
  var row = document.createElement('div'); row.className = 'ln';
  row.innerHTML = '<span class="ts">' + esc(ts) + '</span> <span class="' + evtClass(ev.type) + '">' + esc(ev.type || 'event') + '</span> ' + esc((ev.route_name ? ev.route_name + ' ' : '') + (ev.detail || ''));
  log.insertBefore(row, log.firstChild);
  while (log.children.length > 100) log.removeChild(log.lastChild);
}
function startEvents() {
  try {
    var source = new EventSource('/api/v1/events');
    source.onmessage = function (e) {
      try { var ev = JSON.parse(e.data); addEvent(ev); } catch (_) {}
    };
  } catch (e) {}
}

build();
initTheme('themeBtn', 'hostit-ember-theme');
initClock('sbClock');
pollOnce(); setInterval(pollOnce, 3000);
startEvents();
</script>
</body>
</html>
