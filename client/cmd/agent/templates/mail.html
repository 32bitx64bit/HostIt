<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{.CSRFToken}}">
<title>HostIt // Agent — Mail</title>
<script>(function(){try{var s=localStorage.getItem('hostit-ember-theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="topbar">
  <div class="logo">HostIt <span class="sub">agent</span></div>
  <nav class="nav">
    <a class="tab" href="/">Home</a>
    <a class="tab" href="/controls">Controls</a>
    <a class="tab" href="/apps">Apps</a>
    <a class="tab active" href="/mail">Mail</a>
  </nav>
  <div class="topbar-right">
    <span class="online-dot"></span><span class="online-label" id="onLabel">ONLINE</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">dark</button>
    <span class="ver">{{.Version}}</span>
  </div>
</div>
<main id="app"><div class="panel"><div class="panel-body"><div class="statusline"><span class="gt">&gt;</span> <span>loading...</span></div></div></div></main>
<div class="statusbar">
  <div class="sb-seg sb-l1">hostit</div>
  <div class="sb-seg sb-l2"><span class="win-act">mail</span></div>
  <div class="sb-right">
    <div class="sb-seg sb-r1" id="sbAgent">agent</div>
    <div class="sb-seg sb-r2">routes <span id="sbRoutes">0</span></div>
    <div class="sb-seg sb-r3" id="sbClock">--:--:--</div>
  </div>
</div>
<script src="/static/components.js"></script>
<script src="/static/app.js"></script>
<script>
var CSRF = document.querySelector('meta[name="csrf-token"]').content;
function apiData(payload) {
  if (payload && payload.status === 'ok' && payload.data !== undefined) return payload.data;
  if (payload && payload.status === 'error') throw new Error(payload.message || 'API error');
  return payload;
}
async function readAPI(res) { return apiData(await res.json()); }
var reloadScheduled = false;
function scheduleReload() { if (reloadScheduled) return; reloadScheduled = true; setTimeout(function () { location.reload(); }, 1500); }
async function fetchJSON(url) {
  var ctl = new AbortController(); var timer = setTimeout(function () { ctl.abort(); }, 5000);
  try {
    var res = await fetch(url, { cache: 'no-store', headers: {'Accept':'application/json'}, signal: ctl.signal });
    var ct = res.headers.get('content-type') || '';
    if (res.redirected || ct.indexOf('application/json') < 0) { scheduleReload(); throw new Error('dashboard response changed'); }
    if (!res.ok) throw new Error('http ' + res.status);
    return await readAPI(res);
  } finally { clearTimeout(timer); }
}
function apiPostJSON(url, data) {
  return fetch(url, { method: 'POST', headers: { 'X-CSRF-Token': CSRF, 'Content-Type': 'application/json' }, body: JSON.stringify(data || {}) });
}

var creds = null;
var currentAddress = '';
var currentMessages = [];
var currentMessageId = null;
var sortDir = 'desc';

function show(el) { if (el) el.classList.remove('hidden'); }
function hide(el) { if (el) el.classList.add('hidden'); }

function build() {
  var h = Ember.sectionHead({ title: 'Mail', crumb: '/ inbox' });

  var loginPanel = Ember.panel({ title: 'Sign In', id: 'loginSection', body:
    Ember.field({ label: 'Account', labelFor: 'acctSelect', content: Ember.select({ id: 'acctSelect', options: [{ value: '', label: 'Loading\u2026' }] }) })
    + Ember.field({ label: 'Password', labelFor: 'passInput', content: Ember.input({ id: 'passInput', type: 'password', placeholder: 'Enter password' }) })
    + '<div class="row-gap mt12">' + Ember.button({ id: 'loginBtn', text: 'Sign In', variant: 'primary' }) + '</div>'
    + Ember.statusline({ id: 'loginStatus', text: '' })
  });

  var inboxPanel = Ember.panel({ title: 'Inbox', id: 'inboxSection', cls: 'hidden', head: '<span class="pspacer"></span>' + Ember.badge({ text: '0', state: 'neutral', id: 'msgCountBadge' }), body:
    '<div class="row-gap mb12">'
    + Ember.badge({ text: '\u2014', state: 'neutral', id: 'acctBadge' })
    + '<span style="flex:1"></span>'
    + Ember.button({ id: 'refreshInboxBtn', text: 'Refresh', cls: 'sm' })
    + Ember.button({ id: 'logoutBtn', text: 'Sign Out', variant: 'danger', cls: 'sm' })
    + '</div>'
    + Ember.table({ id: 'inboxTable', headers: [
      { label: 'From' },
      { label: 'Subject' },
      { label: 'Date', sortable: true, sort: 'date', id: 'dateTh' }
    ] })
  });

  var msgPanel = Ember.panel({ title: 'Message', id: 'msgSection', cls: 'hidden', body:
    Ember.kv({ pairs: [
      { k: 'From', v: '\u2014', id: 'msgFrom' },
      { k: 'To', v: '\u2014', id: 'msgTo' },
      { k: 'Subject', v: '\u2014', id: 'msgSubject' },
      { k: 'Date', v: '\u2014', id: 'msgDate' }
    ] })
    + '<pre class="input" id="msgBody" style="white-space:pre-wrap;min-height:200px;max-height:560px;overflow:auto;font-family:ui-monospace,monospace;font-size:12px;margin-top:12px">\u2014</pre>'
    + '<div class="row-gap mt12">'
    + Ember.button({ id: 'backBtn', text: '\u2190 Back', cls: 'sm' })
    + Ember.button({ id: 'deleteBtn', text: 'Delete', variant: 'danger', cls: 'sm' })
    + '</div>'
  });

  $('#app').innerHTML = h + loginPanel + inboxPanel + '<div class="mt12">' + msgPanel + '</div>';

  wire();
}

function wire() {
  $('#loginBtn').addEventListener('click', doLogin);
  $('#passInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') $('#loginBtn').click(); });
  $('#refreshInboxBtn').addEventListener('click', loadInbox);
  $('#logoutBtn').addEventListener('click', doLogout);
  $('#backBtn').addEventListener('click', function () { hide($('#msgSection')); show($('#inboxSection')); });
  $('#deleteBtn').addEventListener('click', doDelete);
  var dateTh = $('#dateTh');
  if (dateTh) dateTh.addEventListener('click', function () { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; renderSortArrow(); renderInbox(currentMessages); });
}

async function loadAccounts() {
  var sel = $('#acctSelect');
  try {
    var accts = await fetchJSON('/api/mail/accounts');
    if (!accts || !accts.length) { sel.innerHTML = '<option value="">No accounts</option>'; }
    else { sel.innerHTML = accts.map(function (a) { return '<option value="' + esc(a.username) + '">' + esc(a.address) + ' (' + esc(a.username) + ')</option>'; }).join(''); }
  } catch (e) {
    var msg = (e && e.message === 'dashboard response changed') ? 'Syncing with agent\u2026' : 'Error loading accounts';
    sel.innerHTML = '<option value="">' + msg + '</option>';
  }
  styleSelects();
}

async function doLogin() {
  var u = $('#acctSelect').value, p = $('#passInput').value;
  if (!u) { setStatus('loginStatus', 'select an account', 'err'); return; }
  if (!p) { setStatus('loginStatus', 'enter a password', 'err'); return; }
  setStatus('loginStatus', 'signing in\u2026', '');
  try {
    var res = await apiPostJSON('/api/mail/login', { username: u, password: p });
    if (!res.ok) { setStatus('loginStatus', 'invalid credentials', 'err'); return; }
    var data = await readAPI(res);
    creds = { username: u, password: p };
    currentAddress = data.address || u;
    showInbox();
    loadInbox();
  } catch (e) { setStatus('loginStatus', 'login failed', 'err'); }
}

function showInbox() {
  hide($('#loginSection')); show($('#inboxSection')); hide($('#msgSection'));
  var ab = $('#acctBadge'); if (ab) { ab.textContent = currentAddress; ab.className = 'badge good'; }
}

function parseDate(s) { if (!s) return 0; var t = Date.parse(s); return isNaN(t) ? 0 : t; }
function fmtDate(s) { if (!s) return '\u2014'; var t = Date.parse(s); if (isNaN(t)) return String(s); try { return new Date(t).toLocaleString(); } catch (_) { return String(s); } }

function renderSortArrow() {
  var th = $('#dateTh'); if (!th) return;
  var ar = th.querySelector('.arrow');
  if (!ar) { ar = document.createElement('span'); ar.className = 'arrow'; th.appendChild(document.createTextNode(' ')); th.appendChild(ar); }
  ar.textContent = sortDir === 'asc' ? '\u25b2' : '\u25bc';
}

function updateCount() {
  var b = $('#msgCountBadge'); if (!b) return;
  var n = currentMessages.length;
  b.textContent = n + ' message' + (n === 1 ? '' : 's');
  b.className = 'badge ' + (n ? 'good' : 'neutral');
}

function renderInbox(msgs) {
  currentMessages = Array.isArray(msgs) ? msgs : [];
  updateCount();
  var tb = $('#inboxTable tbody'); if (!tb) return;
  if (!currentMessages.length) { tb.innerHTML = '<tr><td colspan="3" class="muted">No messages</td></tr>'; return; }
  var sorted = currentMessages.slice().sort(function (a, b) {
    var da = parseDate(a.date), db = parseDate(b.date);
    if (da === db) return (a.id || 0) - (b.id || 0);
    return sortDir === 'asc' ? da - db : db - da;
  });
  tb.innerHTML = sorted.map(function (m) {
    return '<tr class="clickable" data-id="' + esc(m.id) + '">'
      + '<td>' + esc(m.from || '') + '</td>'
      + '<td>' + esc(m.subject || '(no subject)') + '</td>'
      + '<td class="mono">' + esc(fmtDate(m.date)) + '</td>'
      + '</tr>';
  }).join('');
  $$('#inboxTable tbody tr').forEach(function (tr) {
    tr.addEventListener('click', function () { openMessage(tr.getAttribute('data-id')); });
  });
}

async function loadInbox() {
  if (!creds) return;
  var tb = $('#inboxTable tbody'); if (tb) tb.innerHTML = '<tr><td colspan="3" class="muted">Loading\u2026</td></tr>';
  try {
    var res = await apiPostJSON('/api/mail/inbox', creds);
    if (!res.ok) throw new Error('Failed to load inbox');
    var msgs = await readAPI(res);
    renderInbox(msgs);
  } catch (e) {
    if (tb) tb.innerHTML = '<tr><td colspan="3" class="muted" style="color:var(--red)">' + esc(e.message) + '</td></tr>';
  }
}

async function openMessage(id) {
  if (!creds) return;
  currentMessageId = Number(id);
  hide($('#inboxSection')); show($('#msgSection'));
  ['msgFrom', 'msgTo', 'msgSubject', 'msgDate'].forEach(function (i) { var e = $('#' + i); if (e) e.textContent = 'Loading\u2026'; });
  var body = $('#msgBody'); if (body) body.textContent = 'Loading\u2026';
  try {
    var res = await apiPostJSON('/api/mail/message', { username: creds.username, password: creds.password, messageId: currentMessageId });
    if (!res.ok) throw new Error('Failed to load message');
    var msg = await readAPI(res);
    $('#msgFrom').textContent = msg.from || '\u2014';
    $('#msgTo').textContent = msg.to || '\u2014';
    $('#msgSubject').textContent = msg.subject || '(no subject)';
    $('#msgDate').textContent = fmtDate(msg.date);
    $('#msgBody').textContent = msg.body || '(empty)';
  } catch (e) {
    $('#msgBody').textContent = 'Error: ' + e.message;
  }
}

async function doDelete() {
  if (!creds || currentMessageId == null) return;
  if (!confirm('Delete this message?')) return;
  try {
    var res = await apiPostJSON('/api/mail/delete', { username: creds.username, password: creds.password, messageId: currentMessageId });
    if (!res.ok) throw new Error('Delete failed');
    hide($('#msgSection')); show($('#inboxSection'));
    loadInbox();
  } catch (e) { alert(e.message); }
}

function doLogout() {
  creds = null; currentAddress = ''; currentMessages = []; currentMessageId = null;
  var pi = $('#passInput'); if (pi) pi.value = '';
  hide($('#inboxSection')); hide($('#msgSection')); show($('#loginSection'));
  setStatus('loginStatus', 'signed out', '');
}

build();
initTheme('themeBtn', 'hostit-ember-theme');
initClock('sbClock');
renderSortArrow();
loadAccounts();
</script>
</body>
</html>
